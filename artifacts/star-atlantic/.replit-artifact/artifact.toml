kind = "web"
previewPath = "/"
title = "Star Atlantic Productions"
version = "1.0.0"
id = "artifacts/star-atlantic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18455

[services.development]
run = "pnpm --filter @workspace/star-atlantic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/star-atlantic", "run", "build" ]
publicDir = "artifacts/star-atlantic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18455"
BASE_PATH = "/"
